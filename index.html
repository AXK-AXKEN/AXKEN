<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AXKEN Minecraft Academy</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #312e81, #050505 60%);
    color: white;
}


/* PORTADA */

header {
    text-align: center;
    padding: 50px 20px;
}


.logo {

    width: 160px;
    height: 160px;

    border-radius: 50%;

    object-fit: cover;

    box-shadow: 0 0 35px #8b5cf6;

    animation: aparecer 1s ease;

}


h1 {

    font-size: 55px;
    margin: 20px 0 5px;

}


h2 {

    color: #a78bfa;

}


p {

    font-size: 18px;

}


/* TARJETAS */


.container {

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:25px;

    padding:30px;

}



.card {

    background:rgba(255,255,255,0.08);

    backdrop-filter: blur(10px);

    width:280px;

    padding:25px;

    border-radius:20px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.1);

    transition:0.3s;

}



.card:hover {

    transform:translateY(-10px);

    box-shadow:0 0 25px #7c3aed;

}



button {

    background:#7c3aed;

    color:white;

    border:none;

    padding:12px 25px;

    border-radius:10px;

    cursor:pointer;

    font-size:16px;

}



button:hover {

    background:#a855f7;

}



/* ANIMACION */


@keyframes aparecer {

from {

opacity:0;

transform:scale(0.5);

}


to {

opacity:1;

transform:scale(1);

}

}



/* CELULAR */


@media(max-width:600px){


h1 {

font-size:40px;

}


.logo {

width:130px;

height:130px;

}


}


</style>


</head>


<body>


<header>


<img src="logo.png" class="logo">


<h1>AXKEN</h1>


<h2>Minecraft Academy</h2>


<p>
Tutoriales • Mods • Shaders • Texture Packs
</p>


</header>



<div class="container">


<div class="card">

<h2>🎮 Tutoriales</h2>

<p>
Guías de Minecraft Java y Bedrock.
</p>

<button>
Ver tutoriales
</button>

</div>



<div class="card">

<h2>🧩 Mods</h2>

<p>
Sodium, Iris, Fabric y más.
</p>

<button>
Ver Mods
</button>

</div>



<div class="card">

<h2>🌈 Shaders</h2>

<p>
Los mejores shaders para Minecraft.
</p>

<button>
Ver Shaders
</button>

</div>



<div class="card">

<h2>🎨 Texture Packs</h2>

<p>
Packs PvP y realistas.
</p>

<button>
Ver Packs
</button>

</div>


</div>


</body>

</html>
