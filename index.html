<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Minecraft Academy</h1>
        <nav>
            <button onclick="switchView('home')">Inicio</button>
            <button onclick="switchView('downloads')">Descargas</button>
        </nav>
    </header>

    <main>
        <!-- Vista de Inicio -->
        <section id="home-view" class="view">
            <h2>Bienvenido a la Academia</h2>
            <p>Aprende todo sobre Minecraft, optimización y servidores.</p>
        </section>

        <!-- Vista de Descargas -->
        <section id="downloads-view" class="view" style="display: none;">
            <h2>Zona de Descargas</h2>
            <button onclick="openModal()">Abrir Modal de Descarga</button>
        </section>
    </main>

    <!-- Ventana Modal -->
    <div id="download-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>Confirmar Descarga</h3>
            <p>Haz clic abajo para obtener tu archivo.</p>
            <a href="#" class="btn-download">Descargar Ahora</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
